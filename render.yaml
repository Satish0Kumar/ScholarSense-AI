services:
  - type: web
    name: scholarsense-backend
    runtime: python
    region: singapore
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: cd .. && gunicorn backend.api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: False
      - key: JWT_ACCESS_TOKEN_EXPIRES
        value: 3600
      - key: PROJECT_NAME
        value: ScholarSense
